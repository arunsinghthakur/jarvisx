[project]
name = "jarvisx"
version = "0.1.0"
description = "JarvisX core shared library"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0.0",
    "psycopg2-binary>=2.9.0",
    "asyncpg>=0.29.0",
    "pgvector>=0.3.0",
    "python-dotenv>=1.0.0",
    "httpx>=0.27.0",
    "a2a-sdk>=0.2.0",
    "google-adk>=0.5.0",
    "mcp>=1.0.0",
    "tiktoken>=0.7.0",
    "openai>=1.0.0",
    "cryptography>=42.0.0",
    "pydantic>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["jarvisx"]
