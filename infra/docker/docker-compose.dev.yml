services:
  postgres:
    image: postgres:15-alpine
    container_name: jarvisx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-jarvisx}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvisx-network

  redis:
    image: redis:7-alpine
    container_name: jarvisx-redis-dev
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-jarvisx} --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-jarvisx}", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - jarvisx-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  jarvisx-network:
    driver: bridge

